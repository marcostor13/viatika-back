name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop

jobs:
  # ---------------------------------------------------
  # ENTORNO DE DESARROLLO (Coolify)
  # Se ejecuta SOLO si el push se hace a la rama 'dev'
  # ---------------------------------------------------
  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    name: Deploy to Coolify (Dev)
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deployment via webhook
        run: |
          curl --silent --show-error --fail \
            --max-time 30 \
            "${{ secrets.COOLIFY_WEBHOOK_URL_DEV }}"

  # ---------------------------------------------------
  # ENTORNO DE PRODUCCIÓN (AWS EC2 + Docker)
  # Se ejecuta SOLO si el push se hace a la rama 'main'
  # ---------------------------------------------------
  deploy-prod:
    if: github.ref == 'refs/heads/main'
    name: Deploy to EC2 (Prod)
    runs-on: ubuntu-latest
    steps:
      - name: Deploy using ssh
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /var/www/nestjs-app
            git pull origin main

            # Crear el archivo .env en el servidor usando el secreto
            echo "${{ secrets.ENV_FILE }}" > .env

            # Levantar los contenedores
            docker compose up -d --build
            docker image prune -f
